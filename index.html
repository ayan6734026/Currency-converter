<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="/cc.css" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <h2>Currency Converter</h2>
    <form>
        <div class="amount_div">
            <p id="amount_para">Enter Amount</p>
            <input name="amount" value="1" type="text" >
        </div >
        <div class="country_select">
        <div class="left_side">
            <p>From</p>
            <div class="from_container">
                <img id="from_flag" src="https://flagsapi.com/US/flat/64.png" alt="">
                <select class="select" name="from"> </select>
            </div>
        </div>
        <i class="fa-solid fa-arrow-right-arrow-left"></i>
        <div class="right_side">
            <p>To</p>
            <div class="to_container">
                <img id="to_flag" src="https://flagsapi.com/IN/flat/64.png" alt="">
                <select class="select" name="to"> </select>
            </div>
        </div>
    </div>
    <h5 class="msg"></h5>
        <button id="button">Get Exchange Rate</button>
    </form>
    </div>
    <script src="/country_code.js"></script>
    <script src="/cc.js"></script>
</body>
</html>
